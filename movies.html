<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List Tracker</title>

    <!-- This links the main.css file to this one, the movies.html file. -->
    <link rel="stylesheet" href="main.css">

    
</head>
<body>
    <header>
        <h1>Movie List Tracker</h1>
    </header>
    <main>
        <form>
            <div>
                <label for="txtMovie">Movie Name:</label>
                  <!-- this is where the user inputs the movie -->
                <input type="text" id="txtMovie" name="txtMovie" placeholder="ex, Movie Time">
            </div>

            <button type= "button" onclick="addMovie()">Add Movie</button>
            <button type= "button" onclick="resetMovieList()">Reset List</button>

            <div id="divMovies">
                ...add movie...
            </div>
        </form>
    </main>
    <!-- This links the javascript file -->
    <script src="movies.js"></script>
 

</body>
</html>
